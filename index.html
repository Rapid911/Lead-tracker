<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#14110F" />
<title>Pipeline — Momentum Tracker</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Pipeline" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-mark">M</span>
    <div class="brand-text">
      <span class="brand-name">Pipeline</span>
      <span class="brand-sub">Momentum Tracker</span>
    </div>
  </div>
  <button class="icon-btn" id="menuBtn" aria-label="Menu">⋮</button>
</header>

<section class="pulse-strip" id="pulseStrip">
  <div class="pulse-card overdue" id="cardOverdue">
    <span class="pulse-number" id="countOverdue">0</span>
    <span class="pulse-label">Overdue</span>
  </div>
  <div class="pulse-card today" id="cardToday">
    <span class="pulse-number" id="countToday">0</span>
    <span class="pulse-label">Due today</span>
  </div>
  <div class="pulse-card upcoming" id="cardUpcoming">
    <span class="pulse-number" id="countUpcoming">0</span>
    <span class="pulse-label">Upcoming</span>
  </div>
  <div class="pulse-card won" id="cardWon">
    <span class="pulse-number" id="countWon">0</span>
    <span class="pulse-label">Disbursed</span>
  </div>
</section>

<div class="search-row">
  <input type="text" id="searchInput" placeholder="Search name or vehicle…" autocomplete="off" />
</div>

<nav class="filter-row" id="filterRow">
  <button class="chip active" data-filter="active">Active</button>
  <button class="chip" data-filter="overdue">Overdue</button>
  <button class="chip" data-filter="today">Today</button>
  <button class="chip" data-filter="won">Disbursed</button>
  <button class="chip" data-filter="dead">Dead</button>
  <button class="chip" data-filter="all">All</button>
</nav>

<main id="leadList" class="lead-list"></main>

<div class="empty-state" id="emptyState" hidden>
  <p class="empty-title">No leads here yet</p>
  <p class="empty-sub">Tap the gold button to add your first lead.</p>
</div>

<button class="fab" id="addBtn" aria-label="Add lead">+</button>

<!-- Lead form sheet -->
<div class="sheet-backdrop" id="sheetBackdrop">
  <div class="sheet" id="leadSheet">
    <div class="sheet-handle"></div>
    <h2 class="sheet-title" id="sheetTitle">New lead</h2>

    <form id="leadForm">
      <input type="hidden" id="leadId" />

      <label class="field">
        <span>Name</span>
        <input type="text" id="fName" required placeholder="e.g. Peter Mwangi" />
      </label>

      <label class="field">
        <span>Phone</span>
        <input type="tel" id="fPhone" placeholder="07XXXXXXXX" />
      </label>

      <label class="field">
        <span>Vehicle</span>
        <input type="text" id="fVehicle" placeholder="e.g. Probox KCX 123A" />
      </label>

      <div class="field-row">
        <label class="field">
          <span>Financing type</span>
          <select id="fType">
            <option>Logbook</option>
            <option>Motor Import</option>
            <option>Asset Financing</option>
            <option>Trade-in</option>
          </select>
        </label>

        <label class="field">
          <span>Source</span>
          <select id="fSource">
            <option>Garage</option>
            <option>Matatu/Boda Stage</option>
            <option>Car Yard/Dealer</option>
            <option>Marketplace (FB/OLX)</option>
            <option>Referral</option>
            <option>Walk-in</option>
            <option>Other</option>
          </select>
        </label>
      </div>

      <label class="field">
        <span>Notes</span>
        <textarea id="fNotes" rows="2" placeholder="Objections, documents pending, key details…"></textarea>
      </label>

      <div class="sheet-actions">
        <button type="button" class="btn-ghost" id="cancelBtn">Cancel</button>
        <button type="submit" class="btn-gold">Save lead</button>
      </div>
    </form>
  </div>
</div>

<!-- Lead detail sheet -->
<div class="sheet-backdrop" id="detailBackdrop">
  <div class="sheet" id="detailSheet">
    <div class="sheet-handle"></div>
    <div id="detailContent"></div>
  </div>
</div>

<!-- Menu sheet: backup / restore -->
<div class="sheet-backdrop" id="menuBackdrop">
  <div class="sheet" id="menuSheet">
    <div class="sheet-handle"></div>
    <h2 class="sheet-title">Backup &amp; data</h2>
    <p class="empty-sub" style="text-align:left;margin-bottom:16px;">
      Your leads live only on this phone. Export a backup now and then so you never lose your pipeline.
    </p>
    <div class="detail-actions">
      <button class="contact-btn" id="exportBtn">Export backup (.json)</button>
      <button class="edit-btn" id="importBtn">Import backup</button>
      <button class="delete-btn" id="closeMenuBtn">Close</button>
    </div>
    <input type="file" id="importFile" accept="application/json" hidden />
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
